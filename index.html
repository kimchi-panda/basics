<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    onSnapshot,
    query,
    orderBy
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // 1. Your config (paste yours here)
 const firebaseConfig = {
  apiKey: "AIzaSyB206bFpU36IQgZxWmRs8IHfetdV_PQ-Kk",
  authDomain: "anon-feed-d1f12.firebaseapp.com",
  projectId: "anon-feed-d1f12",
  storageBucket: "anon-feed-d1f12.firebasestorage.app",
  messagingSenderId: "255149951515",
  appId: "1:255149951515:web:ec4d0115268b8c73fbc6be"
};

  // 2. Start Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 3. Send post function
  window.sendPost = async function () {
    const text = document.getElementById("input").value;

    await addDoc(collection(db, "posts"), {
      text: text,
      time: Date.now()
    });

    document.getElementById("input").value = "";
  };

  // 4. Live feed
  const q = query(collection(db, "posts"), orderBy("time", "desc"));

  onSnapshot(q, (snapshot) => {
    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    snapshot.forEach((doc) => {
      const p = document.createElement("p");
      p.textContent = doc.data().text;
      feed.appendChild(p);
    });
  });
</script>

<input id="input" placeholder="write something..." />
<button onclick="sendPost()">Post</button>

<div id="feed"></div>
